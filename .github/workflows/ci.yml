name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  host:
    name: Host checks (x86_64-unknown-linux-gnu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-host-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-host-

      - name: Format check
        run: cargo fmt --all -- --check

      - name: Host build
        run: cargo build --target x86_64-unknown-linux-gnu --all-targets

      - name: Host unit tests
        run: cargo test --target x86_64-unknown-linux-gnu --all-targets -- --nocapture

      - name: Clippy (host)
        run: cargo clippy --target x86_64-unknown-linux-gnu --all-targets --no-deps

  embedded:
    name: Embedded build (thumbv7m-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup show

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-embedded-${{ hashFiles('rust-toolchain.toml', 'Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-embedded-

      - name: Embedded build
        run: cargo build --target thumbv7m-none-eabi

      - name: Embedded build (release)
        run: cargo build --target thumbv7m-none-eabi --release

      - name: Clippy (embedded)
        run: cargo clippy --target thumbv7m-none-eabi --no-deps
